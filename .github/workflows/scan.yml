name: KoyEviBot Tarama

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      delete_seen_ids:
        description: "seen.db'den silinecek ilan ID'leri (virgülle ayrılmış, örn: 19623087,19623088)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: koyevibot-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: seen.db önbelleğini geri yükle
        uses: actions/cache@v4
        with:
          path: seen.db
          key: seen-db-${{ github.run_id }}
          restore-keys: |
            seen-db-

      - name: Belirtilen ilanları seen.db'den sil
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.delete_seen_ids != '' }}
        run: |
          python3 - <<'EOF'
          import sqlite3, os
          ids = os.environ["DELETE_IDS"].split(",")
          if not os.path.exists("seen.db"):
              print("seen.db yok, atlanıyor.")
          else:
              conn = sqlite3.connect("seen.db")
              for raw in ids:
                  lid = raw.strip()
                  if lid:
                      conn.execute("DELETE FROM seen WHERE id = ?", (lid,))
                      print(f"Silindi (seen): {lid}")
              conn.commit()
              conn.close()
          EOF
        env:
          DELETE_IDS: ${{ inputs.delete_seen_ids }}

      - name: Botu çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_FORUM_CHAT_ID: ${{ secrets.TELEGRAM_FORUM_CHAT_ID }}
        run: python3 bot.py

      - name: dashboard.html ve topics.json değiştiyse commit'le
        run: |
          git config user.name "KoyEviBot"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard.html
          test -f topics.json && git add topics.json || true
          git diff --cached --quiet || git commit -m "Dashboard + topic ID'leri güncellendi [skip ci]"
          git push
